<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>試卷上傳系統</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="bg-body-tertiary">
    <div class="app-layout">
      
      <!-- Sidebar Navigation -->
      <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <i class="bi bi-cloud-arrow-up-fill fs-3 text-primary"></i>
          <span class="fs-5 fw-bold ms-2 mt-1">試卷上傳系統</span>
        </div>
        
        <ul class="nav flex-column sidebar-nav mt-4" id="nav-links">
          <li class="nav-item">
            <a href="#/" class="nav-link active" data-path="/">
              <i class="bi bi-speedometer2 me-2"></i> 試卷上傳情形
            </a>
          </li>
          
          <h6 class="sidebar-heading px-3 mt-4 mb-2 text-primary-emphasis text-uppercase fw-bold admin-menu-item d-none">
            <span>行政管理</span>
          </h6>
          <li class="nav-item admin-menu-item d-none">
            <a href="#/admin/exam-plans" class="nav-link" data-path="/admin/exam-plans">
              <i class="bi bi-calendar3 me-2"></i> 考試分項管理
            </a>
          </li>
          <li class="nav-item admin-menu-item d-none">
            <a href="#/admin/subjects" class="nav-link" data-path="/admin/subjects">
              <i class="bi bi-book me-2"></i> 科目管理
            </a>
          </li>
          <li class="nav-item admin-menu-item d-none">
            <a href="#/admin/classes" class="nav-link" data-path="/admin/classes">
              <i class="bi bi-diagram-3 me-2"></i> 群科班級管理
            </a>
          </li>
          <li class="nav-item admin-menu-item d-none">
            <a href="#/admin/users" class="nav-link" data-path="/admin/users">
              <i class="bi bi-people me-2"></i> 帳號管理
            </a>
          </li>
        </ul>
      </nav>

      <!-- Main Content Wrapper -->
      <div id="main-wrapper">
        
        <!-- Top Navigation -->
        <header id="topnav" class="topnav shadow-sm p-3 mb-4 bg-white rounded flex-shrink-0">
          <div class="d-flex justify-content-between align-items-center w-100">
            <button class="btn btn-light d-md-none me-3" id="sidebar-toggle">
              <i class="bi bi-list fs-4"></i>
            </button>
            
            <div class="ms-auto d-flex align-items-center dropdown">
              <div class="user-profile me-2" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle fs-4 text-primary me-2"></i>
                <span class="fw-semibold text-secondary" id="user-display-name">載入中...</span>
              </div>
              <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-box-arrow-right me-2"></i>登出</a></li>
              </ul>
            </div>
          </div>
        </header>

        <!-- Router Outlet -->
        <main id="app-content" class="container-fluid px-md-4 pb-5 flex-grow-1">
          <!-- Views will be injected here -->
        </main>
      </div>

    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
